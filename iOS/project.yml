name: SunglassesCase
options:
  bundleIdPrefix: com.shimondeitel.sunglassescase
  deploymentTarget:
    iOS: "17.0"
  createIntermediateGroups: true
  groupSortPosition: top
settings:
  base:
    MARKETING_VERSION: "1.0"
    CURRENT_PROJECT_VERSION: "1"
    SWIFT_VERSION: "5.0"
    DEVELOPMENT_TEAM: "W7Q885Q59C"
    CODE_SIGN_STYLE: Automatic
    IPHONEOS_DEPLOYMENT_TARGET: "17.0"
    TARGETED_DEVICE_FAMILY: "1"
    ENABLE_USER_SCRIPT_SANDBOXING: "YES"
targets:
  SunglassesCase:
    type: application
    platform: iOS
    sources:
      - path: SunglassesCase
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.sunglassescase
        TARGETED_DEVICE_FAMILY: "1"
        INFOPLIST_FILE: SunglassesCase/Info.plist
        ASSETCATALOG_COMPILER_APPICON_NAME: AppIcon
        ASSETCATALOG_COMPILER_GLOBAL_ACCENT_COLOR_NAME: AccentColor
        ENABLE_PREVIEWS: "YES"
        GENERATE_INFOPLIST_FILE: "NO"
  SunglassesCaseTests:
    type: bundle.unit-test
    platform: iOS
    sources:
      - path: SunglassesCaseTests
      - path: SunglassesCase.storekit
    dependencies:
      - target: SunglassesCase
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.sunglassescase.tests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
  SunglassesCaseUITests:
    type: bundle.ui-testing
    platform: iOS
    sources:
      - path: SunglassesCaseUITests
    dependencies:
      - target: SunglassesCase
    settings:
      base:
        PRODUCT_BUNDLE_IDENTIFIER: com.shimondeitel.sunglassescase.uitests
        GENERATE_INFOPLIST_FILE: "YES"
        TARGETED_DEVICE_FAMILY: "1"
schemes:
  SunglassesCase:
    build:
      targets:
        SunglassesCase: all
        SunglassesCaseTests: [test]
        SunglassesCaseUITests: [test]
    run:
      config: Debug
      storeKitConfiguration: SunglassesCase.storekit
    test:
      config: Debug
      storeKitConfiguration: SunglassesCase.storekit
      targets:
        - SunglassesCaseTests
        - SunglassesCaseUITests
    archive:
      config: Release
